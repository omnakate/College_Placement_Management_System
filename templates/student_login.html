<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #0b1d51;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #3498db;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 12px;
            color: #555;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0b1d51;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            text-decoration: none;
            color: #3498db;
        }

        .error {
            text-align: center;
            color: red;
            margin-bottom: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Student Login</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input name="email" type="email" placeholder="Email Address" required>

        <div class="password-wrapper">
            <input id="password" name="password" type="password" placeholder="Password" required>
            <span class="toggle" onclick="togglePassword()">Show</span>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        New here? <a href="/student/register">Create account</a>
    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById("password");
    const toggle = document.querySelector(".toggle");

    if (input.type === "password") {
        input.type = "text";
        toggle.innerText = "Hide";
    } else {
        input.type = "password";
        toggle.innerText = "Show";
    }
}
</script>

</body>
</html>
