<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
        }

        .login-box {
            width: 360px;
            padding: 30px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        h2 {
            margin: 0 0 20px;
            text-align: center;
            color: #2c3e50;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: 0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #1e2f3f;
        }

        .error {
            margin-bottom: 14px;
            padding: 10px;
            background: #ffecec;
            color: #b00020;
            border: 1px solid #ffb3b3;
            border-radius: 5px;
            text-align: center;
        }

        .back-link {
            display: block;
            margin-top: 16px;
            text-align: center;
            color: #2c3e50;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Admin Login</h2>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin.login') }}">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <a class="back-link" href="{{ url_for('student.index') }}">Back to Home</a>
</div>

</body>
</html>
