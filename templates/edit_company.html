<!DOCTYPE html>
<html>
<head>
    <title>Edit Company</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="card">
    <h2>Edit Company</h2>

    <form method="POST" action="{{ url_for('admin.update_company', id=company[0]) }}">

        <div class="form-group">
            <label>Company Name</label>
            <input type="text" name="company_name" value="{{ company[1] }}" required>
        </div>

        <div class="form-group">
            <label>Job Role / Position</label>
            <input type="text" name="job_role" value="{{ company[2] }}" required>
        </div>

        <div class="form-group">
            <label>CTC (LPA)</label>
            <input type="number" step="0.01" name="ctc" value="{{ company[3] }}" required>
        </div>

        <div class="form-group">
            <label>Minimum CGPA</label>
            <input type="number" step="0.01" name="cgpa" value="{{ company[4] }}" required>
        </div>

        <div class="form-group">
            <label>Eligible Branches</label>
            <input type="text" name="branches" value="{{ company[5] }}" required>
        </div>

        <div class="form-group">
            <label>Allowed Backlogs</label>
            <input type="number" name="backlogs" value="{{ company[6] }}" required>
        </div>

        <div class="form-group">
            <label>Registration Deadline</label>
            <input type="datetime-local" name="deadline"
                   value="{{ company[7]|replace(' ', 'T') }}" required>
        </div>

        <div class="form-group">
            <label>Drive Date</label>
            <input type="date" name="drive_date" value="{{ company[8] }}" required>
        </div>

        <div class="form-group">
            <label>Reporting Time</label>
            <input type="time" name="reporting_time" value="{{ company[9] }}" required>
        </div>

        <div class="form-group">
            <label>Venue / Platform</label>
            <input type="text" name="venue" value="{{ company[10] }}" required>
        </div>

        <div class="form-group">
            <label>Google Form Link</label>
            <input type="url" name="google_form_link" value="{{ company[11] }}" required>
        </div>

        <button type="submit">Update Company</button>

    </form>
</div>

</body>
</html>
